<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xcape</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>xcape</h1>
  <p class="tagline">file transfer via QR codes · no network needed</p>

  <div class="toggle">
    <button id="btn-send" class="active">Send</button>
    <button id="btn-recv">Receive</button>
  </div>

  <!-- ── SEND PANEL ── -->
  <div class="panel active" id="panel-send">
    <div class="controls">
      <label>Density</label>
      <div class="seg">
        <button id="den-low"               >S &middot; 200 B</button>
        <button id="den-medium" class="active">M &middot; 500 B</button>
        <button id="den-high"              >L &middot; 900 B</button>
      </div>
      <button id="dtmf-send-btn" class="seg-single">DTMF</button>
    </div>
    <p class="dtmf-hint">DTMF: steps on receiver tone · no auto-advance</p>

    <div id="drop-zone">
      <div class="icon">📂</div>
      <p><strong>Drop a file here</strong></p>
      <p>or click to browse</p>
    </div>
    <input type="file" id="file-input" />

    <div id="send-ui">
      <div class="file-info" id="file-info"></div>

      <div id="qr-canvas-wrap">
        <canvas id="qr-canvas" width="360" height="360"></canvas>
      </div>

      <p class="chunk-label">
        Chunk <span id="chunk-current">1</span> of <span id="chunk-total">1</span>
        &nbsp;·&nbsp; loop <span id="loop-count">1</span>
      </p>

      <div class="progress-bar-wrap" title="Click to jump to a chunk">
        <div class="progress-bar" id="send-progress" style="width:0%"></div>
      </div>
      <span class="progress-hint">&#x2197; click bar to seek</span>

      <div class="controls" id="speed-controls">
        <label for="speed-range">Speed</label>
        <input type="range" id="speed-range" min="300" max="3000" step="100" value="1000" />
        <span class="speed-val" id="speed-val">1.0s</span>
      </div>

      <button id="reset-send-btn" class="btn btn-ghost">Choose another file</button>
    </div>
  </div>

  <!-- ── RECEIVE PANEL ── -->
  <div class="panel" id="panel-recv">
    <div class="recv-toolbar">
      <button id="dtmf-recv-btn" class="seg-single">DTMF</button>
      <button id="reset-recv-early-btn" class="icon-btn" title="Start over">&#x21BA;</button>
    </div>
    <p class="dtmf-hint">DTMF: beeps on each new chunk · sender steps on tone</p>

    <button class="btn btn-primary" id="start-camera-btn">Start Camera</button>

    <div id="video-wrap" style="display:none">
      <video id="recv-video" playsinline autoplay muted></video>
      <div id="scan-overlay"><div class="scan-box"></div></div>
    </div>
    <canvas id="recv-canvas"></canvas>

    <div id="recv-status" style="display:none">
      <p class="status-line" id="recv-status-text">Waiting for QR codes…</p>
      <p class="status-speed" id="recv-speed"></p>
      <div id="chunks-grid"></div>
    </div>

    <div id="recv-done">
      <div class="done-icon">✅</div>
      <p id="recv-done-text"></p>
      <a class="btn btn-primary" id="download-btn">Download file</a>
      <br/><br/>
      <button id="reset-recv-btn" class="btn btn-ghost">Receive another file</button>
    </div>

    <p class="error-msg" id="recv-error"></p>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
